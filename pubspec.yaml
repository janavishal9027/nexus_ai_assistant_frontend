name: chatapp_flutter
description: "ChatGPT-like interface with multi-provider LLM routing and fallback"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.2
  flutter_markdown: ^0.7.6
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  flutter_highlight: ^0.7.0
  markdown: ^7.3.1
  forui: ^0.23.0
  # Official brand icons (WhatsApp, LinkedIn, Reddit …) for the share dialog.
  font_awesome_flutter: ^11.0.0
  # Cross-platform URL / app launching (browser, WhatsApp, provider key pages).
  # dart:io Process only works on desktop; this covers Android + iOS too.
  url_launcher: ^6.3.0
  file_selector: ^1.1.0
  image_picker: ^1.2.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
